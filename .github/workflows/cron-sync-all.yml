# POST /api/v1/cron/sync-all — manual only. Daily schedule: cron-daily-pipeline.yml (runs with niche + refresh).
#
# Secrets: CRON_SECRET, SYNC_ALL_URL

name: Cron sync-all

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: POST sync-all
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          SYNC_ALL_URL: ${{ secrets.SYNC_ALL_URL }}
        run: |
          if [ -z "$CRON_SECRET" ] || [ -z "$SYNC_ALL_URL" ]; then
            echo "::error::Set Actions secrets CRON_SECRET and SYNC_ALL_URL"
            exit 1
          fi
          curl -fsS --max-time 300 -X POST "$SYNC_ALL_URL" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -w "\nHTTP %{http_code}\n"
